name = "samlauder-com"
compatibility_date = "2024-09-23"
# pages_build_output_dir is intentionally absent. @astrojs/cloudflare v13 copies
# this field into dist/server/wrangler.json, causing Pages CI to validate that file
# as a Pages config and reject Workers-only keys (main, rules, assets). Omitting it
# here makes the generated config a valid Workers config. The output directory (dist)
# remains configured via the Pages project settings in the Cloudflare dashboard.

[[d1_databases]]
binding = "DB"
database_name = "samlauder-art-log"
database_id = "87453463-b938-4fda-a258-3cfeb21c3313"

[[r2_buckets]]
binding = "ART_IMAGES"
bucket_name = "samlauder-art-log"
