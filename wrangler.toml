name = "samlauder-com"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-23"
# NOTE: pages_build_output_dir is present so Pages CI knows to look inside dist/ for
# the full output structure (dist/client/ for static assets, dist/server/wrangler.json
# for the Worker). However, @astrojs/cloudflare v13 copies this field into the
# generated dist/server/wrangler.json, which causes Pages to validate that file as a
# Pages config and reject Workers-only keys (main, rules, assets). The post-build
# script in scripts/fix-worker-config.mjs removes pages_build_output_dir from the
# generated file so Pages validates it as a Workers config instead.

[[d1_databases]]
binding = "DB"
database_name = "samlauder-art-log"
database_id = "87453463-b938-4fda-a258-3cfeb21c3313"

[[r2_buckets]]
binding = "ART_IMAGES"
bucket_name = "samlauder-art-log"
