name = "samlauder-com"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-23"

# Prevents @astrojs/cloudflare from injecting the reserved "ASSETS" binding.
# The adapter only adds assets.binding = "ASSETS" when config.assets.binding is
# undefined; defining any binding here satisfies that check. The binding itself
# is unused — Pages serves static files via pages_build_output_dir directly.
[assets]
binding = "STATIC"

[[d1_databases]]
binding = "DB"
database_name = "samlauder-art-log"
database_id = "87453463-b938-4fda-a258-3cfeb21c3313"

[[r2_buckets]]
binding = "ART_IMAGES"
bucket_name = "samlauder-art-log"
